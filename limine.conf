# Timeout in seconds that Limine will use before automatically booting.
timeout: 5

# The entry name that will be displayed in the boot menu.
/myOS
    protocol: limine

    path: boot():/boot/cat_kernel.elf

    module_path: boot():/FONT.F16
    module_cmdline: FONT

    module_path: boot():/bad_apple.bin
    module_cmdline: bad_apple